[pytest]
# Scope pytest to the Python Lambda tests; keep it away from the JS/Expo tree.
testpaths = tests
python_files = test_*.py
# importlib mode lets same-named test files (test_handler.py) live in multiple
# suites without needing __init__.py packages or unique basenames.
addopts = --import-mode=importlib
# Make tests/shared's non-test helper modules importable by name (WHIT-258 —
# _goal_nudge_fakes.py, shared by the two goal-nudge suites). Basenames here must stay
# globally unique; importlib mode doesn't add test dirs to sys.path on its own.
pythonpath = tests/shared
