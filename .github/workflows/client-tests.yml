name: Client tests

# Trigger economy (keeps Actions minutes down):
#   - push only on `main` → feature branches are covered by their PR, so a branch
#     push no longer runs CI a SECOND time alongside the pull_request event.
#   - pull_request with `paths` → this client suite runs only when client files
#     change; a server-only PR skips it entirely (the Python workflow still runs).
# Caveat: if branch protection ever marks this a REQUIRED check, a path-skipped run
# leaves the PR's check "pending" and can block merge — revisit paths if that's turned on.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/**"
      - "app/**"
      - "package.json"
      - "package-lock.json"
      - "jest.config.js"
      - "jest.setup.js"
      - "tsconfig.json"
      - ".github/workflows/client-tests.yml"

# Cancel an in-progress run when a newer commit lands on the same branch/PR, so a
# quick succession of pushes doesn't stack up runs (each burning minutes to finish).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the local dev Node major.
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type-resolved: with node_modules installed, tsc sees native module types
      # the offline sandbox is blind to. This is the regression gate on merge.
      - name: Typecheck
        run: npm run typecheck

      # The FULL suite (both projects), no coverage. `npm test` alone now runs only the
      # fast `logic` project (the dev inner loop), so CI uses test:all to keep the heavy
      # `screen` project in the gate. Tests are the pass/fail gate here.
      #
      # Coverage is temporarily OFF in CI (WHIT-243). The 100+ screen suites boot the whole
      # React Native module graph; the old istanbul coverage provider pushed a worker past
      # Node's ~2GB heap ceiling (OOM crash), and switching to V8 coverage traded the crash
      # for a ~9-min hang while it remaps source. Rather than block merges, we run the tests
      # without coverage and restore the floor separately via sharding (WHIT-243).
      # --workerIdleMemoryLimit (in test:all) recycles a bloated worker between files and
      # --maxWorkers=2 bounds concurrency, both as memory backstops.
      - name: Run tests
        run: npm run test:all -- --maxWorkers=2
