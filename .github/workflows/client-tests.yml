name: Client tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the local dev Node major.
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type-resolved: with node_modules installed, tsc sees native module types
      # the offline sandbox is blind to. This is the regression gate on merge.
      - name: Typecheck
        run: npm run typecheck

      # --coverage enforces the floor in jest.config.js (coverageThreshold) and
      # prints the per-file table into the Actions log. A ratchet, like the Python gate.
      - name: Run tests
        run: npm test -- --coverage

      # Render the coverage table onto the run summary page so it's visible
      # without opening the job log. Runs even if the tests failed (if: always),
      # so a floor breach still shows the numbers. Reads the json-summary file.
      - name: Coverage summary
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            let data;
            try { data = JSON.parse(fs.readFileSync("coverage/coverage-summary.json")); }
            catch { process.exit(0); }
            const cwd = process.cwd() + "/";
            const pct = (x) => `${x.pct}%`;
            const t = data.total;
            let md = "## 🧪 Jest coverage\n\n";
            md += "Floor: statements 30% · branches 42% · functions 22% · lines 30%\n\n";
            md += "| file | stmts | branch | funcs | lines |\n|---|---|---|---|---|\n";
            md += `| **TOTAL** | ${pct(t.statements)} | ${pct(t.branches)} | ${pct(t.functions)} | ${pct(t.lines)} |\n`;
            for (const [k, v] of Object.entries(data)) {
              if (k === "total") continue;
              const rel = k.startsWith(cwd) ? k.slice(cwd.length) : k;
              md += `| ${rel} | ${pct(v.statements)} | ${pct(v.branches)} | ${pct(v.functions)} | ${pct(v.lines)} |\n`;
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '
