name: iOS → TestFlight

# Build the production iOS app on EAS and submit it to TestFlight, hands-free.
#
# Trigger: a version tag (v*) OR the manual "Run workflow" button — deliberately
# NOT every push to main, which would burn EAS build credits and clutter TestFlight.
# To ship: `git tag v1.0.1 && git push origin v1.0.1` (or click Run workflow).
#
# To switch to build-on-every-merge instead, replace the `push.tags` block with:
#   push:
#     branches: [main]
#
# Requires one secret — EXPO_TOKEN (an Expo robot access token) — in
# GitHub → Settings → Secrets and variables → Actions. The App Store Connect API
# key is stored on EAS from the first interactive `eas submit`, so --auto-submit
# works non-interactively here.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-and-submit:
    name: Build + submit to TestFlight
    runs-on: ubuntu-latest
    # EAS capability-sync auto-DISABLES any Apple capability it can't see in the
    # entitlements. expo-notifications only injects aps-environment at build time, so
    # the syncer wrongly strips Push Notifications from the App ID every run, and the
    # generated provisioning profile then lacks aps-environment → the build fails to
    # sign. Turn the syncer off; Push stays enabled on the App ID as configured.
    # https://docs.expo.dev/build-reference/ios-capabilities/
    env:
      EXPO_NO_CAPABILITY_SYNC: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build on EAS and submit to TestFlight
        run: eas build --platform ios --profile production --auto-submit --non-interactive
