name: Python tests

# Trigger economy (keeps Actions minutes down):
#   - push only on `main` → feature branches are covered by their PR, so a branch
#     push no longer runs CI a SECOND time alongside the pull_request event.
#   - pull_request with `paths` → this server suite runs only when server files
#     change; a client-only PR skips it entirely (the Client workflow still runs).
# Caveat: if branch protection ever marks this a REQUIRED check, a path-skipped run
# leaves the PR's check "pending" and can block merge — revisit paths if that's turned on.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "shared/**"
      - "lambda*/**"
      - "tests/**"
      - "pytest.ini"
      - "**/requirements*.txt"
      - ".github/workflows/python-tests.yml"

# Cancel an in-progress run when a newer commit lands on the same branch/PR, so a
# quick succession of pushes doesn't stack up runs (each burning minutes to finish).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the Lambda runtime (terraform/lambda.tf: python3.12).
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r lambda_sync_trigger/requirements-dev.txt

      # Prints the per-file coverage table (with missing lines) into the Actions
      # log, and fails the build if total coverage drops below the gate. The gate
      # is a ratchet: raise it toward 80% as the outstanding test cards land.
      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=shared --cov=lambda --cov=lambda_api --cov=lambda_sync_trigger \
            --cov=lambda_balance_poller --cov=lambda_presignup --cov=lambda_push_receipts \
            --cov=lambda_goal_nudge \
            --cov-report=term-missing \
            --cov-fail-under=72

      # Render the coverage table onto the run summary page so it's visible
      # without opening the job log. Runs even if the tests failed (if: always),
      # so a floor breach still shows the numbers. Reads the .coverage data file
      # pytest-cov wrote before the fail-under check.
      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## 🐍 Python coverage"
            echo ""
            echo "Floor: 72%"
            echo ""
            python -m coverage report --format=markdown 2>/dev/null \
              || { echo '```'; python -m coverage report 2>/dev/null || echo "(no coverage data)"; echo '```'; }
          } >> "$GITHUB_STEP_SUMMARY"
