name: Python tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the Lambda runtime (terraform/lambda.tf: python3.12).
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r lambda_sync_trigger/requirements-dev.txt

      - name: Run tests
        run: python -m pytest
